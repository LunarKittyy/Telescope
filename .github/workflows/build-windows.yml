name: Build Windows EXE

on:
  push:
    branches: [master]
    paths: [desktop/**]
  pull_request:
    paths: [desktop/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install runtime deps + PyInstaller
        working-directory: desktop
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        working-directory: desktop
        run: pyinstaller telescope.spec

      - name: Assemble release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bundle
          Copy-Item desktop/dist/TelescopeDesktop.exe bundle/
          Copy-Item desktop/start.bat bundle/
          Copy-Item -Recurse desktop/platform-tools bundle/platform-tools
          Copy-Item -Recurse desktop/unitycapture bundle/unitycapture
          Compress-Archive -Path bundle/* -DestinationPath Telescope-windows.zip

      - name: Update rolling release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          prerelease: false
          make_latest: true
          files: Telescope-windows.zip
