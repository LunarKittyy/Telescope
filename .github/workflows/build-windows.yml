name: Build Windows EXE

on:
  push:
    branches: [master]
    paths: [desktop/**]
  pull_request:
    paths: [desktop/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install runtime deps + PyInstaller
        working-directory: desktop
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        working-directory: desktop
        run: pyinstaller phonecam.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneCamDesktop-windows
          path: desktop/dist/PhoneCamDesktop.exe
          retention-days: 30

      - name: Update rolling release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: |
            Rolling release — always contains the newest builds from `master`.

            | File | Description |
            |------|-------------|
            | `PhoneCamDesktop.exe` | Windows desktop app (requires [UnityCapture](https://github.com/schellingb/UnityCapture) for virtual camera) |
            | `phonecam_desktop.py` | Desktop app source — run directly with `pip install PyQt6 opencv-python pyvirtualcam numpy` |
            | `PhoneCam.apk` | Android app |
          prerelease: true
          make_latest: false
          files: |
            desktop/dist/PhoneCamDesktop.exe
            desktop/phonecam_desktop.py
