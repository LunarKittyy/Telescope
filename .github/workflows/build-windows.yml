name: Build Windows EXE

on:
  push:
    branches: [master]
    paths: [desktop/**]
  pull_request:
    paths: [desktop/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.ref == 'refs/heads/master' && 'nightly-release' || format('build-windows-{0}', github.run_id) }}
      cancel-in-progress: false
      # Let master-branch runs queue instead of a new push canceling whatever
      # publisher run was already pending in this shared group.
      queue: max

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies
        working-directory: desktop
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: desktop
        run: python -m pytest -q

      - name: Install runtime deps + PyInstaller
        working-directory: desktop
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        working-directory: desktop
        run: pyinstaller telescope.spec

      - name: Assemble release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bundle
          Copy-Item desktop/dist/TelescopeDesktop.exe bundle/
          Copy-Item desktop/start.bat bundle/
          Copy-Item -Recurse desktop/platform-tools bundle/platform-tools
          Copy-Item -Recurse desktop/unitycapture bundle/unitycapture
          Compress-Archive -Path bundle/* -DestinationPath Telescope-windows.zip

      - name: Verify release bundle
        shell: pwsh
        run: |
          # Guards against start.bat referencing a file that never actually
          # made it into the released archive (see desktop/start.bat).
          $required = @(
            "bundle/TelescopeDesktop.exe",
            "bundle/start.bat",
            "bundle/platform-tools",
            "bundle/unitycapture"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Release bundle is missing: $($missing -join ', ')"
            exit 1
          }
          Write-Host "Release bundle verified."

      - name: Recreate rolling pre-release
        if: github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/recreate-nightly.sh Telescope-windows.zip
