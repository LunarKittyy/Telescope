name: Build Linux bundle

on:
  push:
    branches: [master]
    paths: [desktop/**]
  pull_request:
    paths: [desktop/**]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Assemble release bundle
        run: |
          mkdir bundle
          cp desktop/main.py bundle/
          cp desktop/requirements.txt bundle/
          cp desktop/start.sh bundle/
          chmod +x bundle/start.sh
          cp -r desktop/phonecam bundle/phonecam
          tar -czf PhoneCam-linux.tar.gz -C bundle .

      - name: Update rolling release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          prerelease: false
          make_latest: true
          files: PhoneCam-linux.tar.gz

