name: Build Linux bundle

on:
  push:
    branches: [master]
    paths: [desktop/**]
  pull_request:
    paths: [desktop/**]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Recreating the nightly release (see step below) races with the other
    # nightly-publishing workflows if they run at the same time, so serialize
    # just the master-branch runs that actually touch it.
    concurrency:
      group: ${{ github.ref == 'refs/heads/master' && 'nightly-release' || format('build-linux-{0}', github.run_id) }}
      cancel-in-progress: false
      # Let master-branch runs queue instead of a new push canceling whatever
      # publisher run was already pending in this shared group.
      queue: max

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies
        working-directory: desktop
        run: |
          # PyQt6 needs these even in QT_QPA_PLATFORM=offscreen mode.
          sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Run tests
        working-directory: desktop
        run: python -m pytest -q

      - name: Packaging smoke checks
        working-directory: desktop
        run: python3 scripts/smoke_check.py

      - name: Assemble release bundle
        run: |
          mkdir bundle
          cp desktop/main.py bundle/
          cp desktop/requirements.txt bundle/
          cp desktop/constraints.txt bundle/
          cp desktop/start.sh bundle/
          chmod +x bundle/start.sh
          cp -r desktop/telescope bundle/telescope
          cp desktop/THIRD_PARTY_NOTICES.txt bundle/
          tar -czf Telescope-linux.tar.gz -C bundle .

      - name: Recreate rolling pre-release
        if: github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/recreate-nightly.sh Telescope-linux.tar.gz

