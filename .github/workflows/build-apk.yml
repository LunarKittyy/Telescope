name: Build APK

on:
  push:
    branches: [master]
    paths: [android/**]
  pull_request:
    paths: [android/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.ref == 'refs/heads/master' && 'nightly-release' || format('build-apk-{0}', github.run_id) }}
      cancel-in-progress: false
      # Let master-branch runs queue instead of a new push canceling whatever
      # publisher run was already pending in this shared group.
      queue: max

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Lint and unit test
        working-directory: android
        run: ./gradlew lintDebug testDebugUnitTest --no-daemon

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Telescope.apk

      - name: Recreate rolling pre-release
        if: github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/recreate-nightly.sh Telescope.apk
