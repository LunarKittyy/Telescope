name: Build APK

on:
  push:
    branches: [master]
    paths: [android/**]
  pull_request:
    paths: [android/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk PhoneCam.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonecam-debug
          path: PhoneCam.apk
          retention-days: 30

      - name: Update rolling release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: |
            Rolling release - always contains the newest builds from `master`.

            | File | Description |
            |------|-------------|
            | `PhoneCam-windows.zip` | Windows bundle: EXE + start.bat + adb + UnityCapture driver. Extract and run `start.bat` or `PhoneCamDesktop.exe`. |
            | `PhoneCam-linux.tar.gz` | Linux bundle: Python script + start.sh. Run `./start.sh` to install deps and launch. |
            | `PhoneCam.apk` | Android app |
          prerelease: true
          make_latest: false
          files: PhoneCam.apk
